env:
  # ---------------真实地形参数-------------------
  # 地形文件
  bty_file_name: qianshui.bty
  # 地形长度（X轴实际长度）（单位:米）
  true_map_width: 10000
  # 地形宽度（Y轴实际长度）（单位:米）
  true_map_height: 10000
  # 地形深度（Z轴实际长度）（单位:米）
  true_map_depth: 550

  # ---------------网格化参数-------------------
  # 对于实际地形的 X 采样间隔（单位:米）
  sampling_x_step: 100
  # 对于实际地形的 Y 采样间隔（单位:米）
  sampling_y_step: 100
  # 对于实际地形的 Z 采样间隔（单位:米）
  sampling_z_step: 50

  # 根据以上信息，不难得到，实际的地形网格参数
  # 网格化是手动预处理的，对于训练程序而言，上面的参数无实际意义
  map_width: 101
  map_height: 101
  map_depth: 11

  # ---------------位置规则参数定义-------------------
  # 敌方移动范围（全局生效）
  enemy_x: 2000
  enemy_y_min: 1000
  enemy_y_max: 9000
  enemy_z: 150

  # 我方移动范围（全局生效）
  uuv_x_min: 2000
  uuv_x_max: 9000
  uuv_y_min: 1000
  uuv_y_max: 9000
  uuv_z_min: 50
  uuv_z_max: 250

  # 我方初始化区域范围
  uuv_start_x_min: 8000
  uuv_start_x_max: 9000
  uuv_start_y_min: 1000
  uuv_start_y_max: 9000
  uuv_start_z_min: 50
  uuv_start_z_max: 250

  # TL 表位置
  tl_table_path: TLdata/average_TL_results.txt

  # ---------------游戏参数定义-------------------
  # 被动声呐探测方程 SL-TL-(NL-DI) > DT
  # 注意，为了效果好看，实际需要统计实验区域的TL分布，然后再设计这几个参数。不然很可能没有任何效果。
  # 自身 SL
  uuv_SL: 135
  # TL 通常是：
  # NL: 环境噪声级，单位dB
  NL: 85
  # DI: 方向性增益，单位dB
  DI: 28
  # DT: 探测阈值，单位dB
  DT: 12
  # 中心 TL 容差，单位dB。即三段式 TL 奖励下，中心 TL 区域的奖励范围是 [TL_center - TL_tolerance, TL_center + TL_tolerance]
  tl_tolerance: 3

  # 胜利位置
  victory_x: 2800

  # 推荐步数采用三段式，低于推荐步数，正常奖惩；超过推荐步数但未超过推荐步数上限，双倍 step 惩罚；超过推荐步数上限，立即死亡
  recommand_step_scaling_factor: 1.3
  max_recommand_step_scaling_factor: 1.7

  # 用于计算平均 TL 奖励的视野大小，同时也是用于训练的视野大小
  # 注意，视野大小是一个以 uuv 为中心的、边长为 field_of_view 的正方形区域。也就是说，视野大小为 21 时，uuv 可以看到距离自己在 x 轴和 y 轴上都不超过 10 米的区域内的地形信息。
  field_of_view: 21
  field_of_view_on_z: 3

  # ---------------BTY处理脚本输出配置-------------------
  # 重采样后地形数据输出路径（相对于项目根目录）
  terrain_output_path: output/bty/terrain.npz
  # 是否生成可视化图像
  enable_visualization: true
  # 可视化图像输出目录
  visualization_output_dir: output/bty

# =============== 训练器配置 ===============
trainer:
  # 检查点保存间隔（每 N 个全局步数保存一次）
  checkpoint_interval: 1000
  # 最大训练回合数
  max_epochs: 6000
  # 每个 epoch 的目标步数
  steps_per_epoch: 6000

# =============== PPO 算法配置 ===============
ppo:
  # 学习率
  learning_rate: 2e-4
  # 折扣因子
  gamma: 0.995
  # GAE 衰减系数
  gae_lambda: 0.95
  # PPO 裁剪系数
  clip_ratio: 0.2
  # 价值函数损失权重
  value_coef: 0.5
  # 熵损失权重
  entropy_coef: 0.04
  # 策略更新 epoch 数
  epochs: 6
  # Minibatch 大小
  minibatch_size: 128
  # Rollout 缓冲区容量（等于 steps_per_epoch）
  rollout_steps: 6000
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bellhop Monitor</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --panel: rgba(10, 23, 41, 0.92);
      --panel-soft: rgba(13, 29, 50, 0.84);
      --text: #e5eefb;
      --muted: #8ea6c6;
      --accent: #4cc9f0;
      --accent-2: #ffb347;
      --border: rgba(118, 155, 200, 0.2);
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI Variable", "Aptos", "Trebuchet MS", sans-serif;
      background:
        radial-gradient(circle at 12% 14%, rgba(76, 201, 240, 0.18), transparent 26%),
        radial-gradient(circle at 88% 4%, rgba(255, 179, 71, 0.12), transparent 20%),
        linear-gradient(180deg, #040b15 0%, #07111f 100%);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 22px 26px 0;
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .title-block h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0.02em;
    }

    .title-block p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      background: var(--panel-soft);
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }

    select, button {
      background: #0e2034;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
    }

    button {
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    button:hover { transform: translateY(-1px); border-color: rgba(76, 201, 240, 0.55); }

    main {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 18px;
      padding: 18px 26px 26px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .sidebar {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .section {
      padding: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .section:last-child { border-bottom: none; }

    .section h2 {
      margin: 0 0 12px;
      font-size: 16px;
      color: #f4f7fb;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .meta-item {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .meta-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .meta-value {
      font-size: 14px;
      line-height: 1.35;
      word-break: break-word;
    }

    .env-list {
      display: grid;
      gap: 8px;
      max-height: 48vh;
      overflow: auto;
      padding-right: 4px;
    }

    .env-item {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(255, 255, 255, 0.03);
      cursor: pointer;
      transition: border-color 0.15s ease, transform 0.15s ease;
    }

    .env-item:hover { transform: translateY(-1px); border-color: rgba(76, 201, 240, 0.45); }
    .env-item.active { border-color: rgba(76, 201, 240, 0.9); background: rgba(76, 201, 240, 0.11); }
    .env-name { font-weight: 600; }
    .env-detail { color: var(--muted); font-size: 12px; margin-top: 4px; }

    #plot {
      min-height: calc(100vh - 140px);
      height: 100%;
      width: 100%;
    }

    .plot-card { min-height: 760px; }

    .status {
      color: var(--muted);
      font-size: 13px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(76, 201, 240, 0.12);
      color: #cbefff;
      border: 1px solid rgba(76, 201, 240, 0.22);
      font-size: 12px;
      margin-bottom: 12px;
    }

    @media (max-width: 1080px) {
      main { grid-template-columns: 1fr; }
      #plot { min-height: 66vh; }
    }
  </style>
</head>
<body>
  <header>
    <div class="title-block">
      <h1>Bellhop 运行结果可视化面板</h1>
      <p>自动加载 env_output 下最新地图缓存目录，选择 env 后按需解析并绘制 3D 几何。</p>
    </div>
    <div class="toolbar">
      <label for="envSelect">Env 文件</label>
      <select id="envSelect"></select>
      <button id="reloadBtn">重新加载</button>
    </div>
  </header>

  <main>
    <aside class="sidebar">
      <div class="card section">
        <span class="pill" id="runBadge">等待加载</span>
        <h2>当前目录</h2>
        <div class="meta-grid" id="runMeta"></div>
      </div>

      <div class="card section">
        <h2>Env 列表</h2>
        <div class="env-list" id="envList"></div>
      </div>

      <div class="card section">
        <h2>当前 Env 信息</h2>
        <div class="meta-grid" id="envMeta"></div>
      </div>
    </aside>

    <section class="card plot-card">
      <div id="plot"></div>
    </section>
  </main>

  <script>
    const state = {
      manifest: null,
      currentEnvId: null,
      currentFigure: null,
    };

    const envSelect = document.getElementById('envSelect');
    const reloadBtn = document.getElementById('reloadBtn');
    const runBadge = document.getElementById('runBadge');
    const runMeta = document.getElementById('runMeta');
    const envList = document.getElementById('envList');
    const envMeta = document.getElementById('envMeta');

    reloadBtn.addEventListener('click', loadManifest);
    envSelect.addEventListener('change', () => loadEnv(envSelect.value));

    async function loadManifest() {
      runBadge.textContent = '加载中...';
      const response = await fetch('/api/manifest', { cache: 'no-store' });
      const manifest = await response.json();
      state.manifest = manifest;
      renderManifest(manifest);

      envSelect.innerHTML = '';
      manifest.envs.forEach((item, index) => {
        const option = document.createElement('option');
        option.value = item.env_id;
        option.textContent = `${index + 1}. ${item.env_id}`;
        envSelect.appendChild(option);
      });

      if (manifest.envs.length > 0) {
        envSelect.value = manifest.envs[0].env_id;
        await loadEnv(manifest.envs[0].env_id);
      } else {
        runBadge.textContent = '未找到 env';
      }
    }

    async function loadEnv(envId) {
      if (!envId) return;
      state.currentEnvId = envId;
      const response = await fetch(`/api/env/${encodeURIComponent(envId)}`, { cache: 'no-store' });
      const payload = await response.json();
      renderEnv(payload);
      await Plotly.newPlot('plot', payload.figure.data, payload.figure.layout, { responsive: true, displaylogo: false });
      state.currentFigure = payload.figure;
    }

    function renderManifest(manifest) {
      runBadge.textContent = `当前地图：${manifest.map_name}`;
      runMeta.innerHTML = '';
      appendMeta(runMeta, 'Env Root', manifest.outputs_root);
      appendMeta(runMeta, 'Env Dir', manifest.env_dir);
      appendMeta(runMeta, 'Map', manifest.map_name);
      appendMeta(runMeta, 'Env Count', String(manifest.env_count));
      appendMeta(runMeta, 'Selected', state.currentEnvId || '-');

      envList.innerHTML = '';
      manifest.envs.forEach((item) => {
        const div = document.createElement('div');
        div.className = 'env-item';
        div.dataset.envId = item.env_id;
        div.innerHTML = `
          <div class="env-name">${item.env_id}</div>
          <div class="env-detail">S: ${formatTriplet(item.source_position)} | R: ${formatTriplet(item.receiver_position)}</div>
          <div class="env-detail">Beam: ${item.beam.alpha_start_deg}° ~ ${item.beam.alpha_end_deg}° | ${item.beam.beta_start_deg}° ~ ${item.beam.beta_end_deg}°</div>
        `;
        div.addEventListener('click', () => {
          envSelect.value = item.env_id;
          loadEnv(item.env_id);
        });
        envList.appendChild(div);
      });
    }

    function renderEnv(payload) {
      envMeta.innerHTML = '';
      appendMeta(envMeta, 'Env ID', payload.env.env_id);
      appendMeta(envMeta, 'Source', formatTriplet(payload.env.source_position));
      appendMeta(envMeta, 'Receiver', formatTriplet(payload.env.receiver_position));
      appendMeta(envMeta, 'Receiver Range', `${payload.env.receiver.r_min_km.toFixed(3)} ~ ${payload.env.receiver.r_max_km.toFixed(3)} km`);
      appendMeta(envMeta, 'Bearing', `${payload.env.receiver.bearing_start_deg.toFixed(1)}° ~ ${payload.env.receiver.bearing_end_deg.toFixed(1)}°`);
      appendMeta(envMeta, 'Alpha Fan', `${payload.env.beam.alpha_start_deg.toFixed(1)}° ~ ${payload.env.beam.alpha_end_deg.toFixed(1)}°`);
      appendMeta(envMeta, 'Beta Fan', `${payload.env.beam.beta_start_deg.toFixed(1)}° ~ ${payload.env.beam.beta_end_deg.toFixed(1)}°`);
      appendMeta(envMeta, 'TL Overlay', payload.env.has_shd_plot ? 'Enabled' : 'Unavailable');
      if (payload.shd_plot && payload.shd_plot.cache_path) {
        appendMeta(envMeta, 'TL Cache', payload.shd_plot.cache_path);
      }

      document.querySelectorAll('.env-item').forEach((item) => {
        item.classList.toggle('active', item.dataset.envId === payload.env.env_id);
      });
    }

    function appendMeta(container, label, value) {
      const card = document.createElement('div');
      card.className = 'meta-item';
      card.innerHTML = `<div class="meta-label">${label}</div><div class="meta-value">${value}</div>`;
      container.appendChild(card);
    }

    function formatTriplet(values) {
      if (!values || values.length !== 3) return '-';
      return `${values[0].toFixed(3)}, ${values[1].toFixed(3)}, ${values[2].toFixed(3)}`;
    }

    loadManifest().catch((error) => {
      runBadge.textContent = '加载失败';
      console.error(error);
    });
  </script>
</body>
</html>

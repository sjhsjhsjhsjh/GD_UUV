<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keypoints 三维点云可视化面板</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header>
    <div class="title-block">
      <h1>Keypoints 三维点云可视化面板</h1>
      <p>先运行 prepare_data.py 生成 data，再用 LiveServer 打开本页。地形采用三维 surface，点云默认按 UUV 深度着色，支持按敌方 y 位置查看切片。</p>
    </div>
    <div class="toolbar">
      <label for="enemySelect">敌方位置</label>
      <select id="enemySelect"></select>
      <button id="reloadBtn" type="button">重新加载</button>
    </div>
  </header>

  <main>
    <aside class="sidebar">
      <div class="card section">
        <span class="pill" id="runBadge">等待加载</span>
        <h2>当前数据</h2>
        <div class="meta-grid" id="runMeta"></div>
      </div>

      <div class="card section">
        <h2>敌方位置列表</h2>
        <div class="env-list" id="enemyList"></div>
      </div>

      <div class="card section">
        <h2>当前敌方统计</h2>
        <div class="meta-grid" id="enemyMeta"></div>
      </div>

      <div class="card section">
        <h2>显示控制</h2>
        <label class="switch-row">
          <input type="checkbox" id="toggleTerrain" checked />
          <span>显示三维地形曲面</span>
        </label>
        <label class="switch-row">
          <input type="checkbox" id="togglePoints" checked />
          <span>显示关键点点云</span>
        </label>
        <label class="field-row" for="pointSizeInput">
          <span>点大小</span>
          <input id="pointSizeInput" type="number" min="1" step="0.2" value="3.2" />
        </label>
        <div class="status" id="statusText">正在初始化...</div>
      </div>
    </aside>

    <section class="card plot-card">
      <div id="plot"></div>
    </section>
  </main>

  <script src="./js/main.js"></script>
</body>
</html>
